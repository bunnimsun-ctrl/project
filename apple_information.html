<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Fruit Information</title>
    <link rel="stylesheet" href="../css/apple.css">
</head>
<div class="infographic-container">
        
        <div class="info-column">
            <h1 class="main-title">Apples</h1>
            
            <div class="highlight-badges">
                <span class="badge yellow-badge">✓ Cholesterol-Free</span>
                <span class="badge yellow-badge">✓ Fat-Free</span>
                <span class="badge yellow-badge">✓ Good Source of Fiber</span>
                <span class="badge yellow-badge">✓ Sodium-Free</span>
            </div>

            <p class="description">
                A good source of vitamins, apples provide <strong>14%</strong> of your daily recommended vitamin C intake.
            </p>
            
            <p class="serving-size">One medium apple (200g)</p>
            
            <a href="Fruit.html" class="back-btn">&larr; Back to Shop</a>
        </div>

        <div class="visual-column">
          
            <img src="../img/apple.png" alt="Apples Infographic" class="bg-apple-img">
            
            <div class="metric-circle fat">
                <span class="value">0.3g</span>
                <span class="label">FAT</span>
            </div>
            
            <div class="metric-circle fiber">
                <span class="value">4.8g</span>
                <span class="label">FIBER</span>
            </div>
            
            <div class="metric-circle calories">
                <span class="value">104</span>
                <span class="label">CALORIES</span>
            </div>
            
            <div class="metric-circle carbs">
                <span class="value">27.6g</span>
                <span class="label">CARBS</span>
            </div>
            
            <div class="metric-circle protein">
                <span class="value">0.5g</span>
                <span class="label">PROTEIN</span>
            </div>
        </div>

    </div>
</body>
</html>
